name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  BACKEND_SERVICE: bilenbilir-api
  FRONTEND_SERVICE: bilenbilir-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Frontend URL
        id: frontend-url
        run: |
          # Try to get existing frontend URL, fallback to expected URL
          FRONTEND_URL=$(gcloud run services describe $FRONTEND_SERVICE \
            --project $PROJECT_ID --region $REGION \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [ -z "$FRONTEND_URL" ]; then
            echo "Frontend not yet deployed, will update CORS after frontend deploy"
          fi
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Deploy Backend
        run: |
          ENV_VARS="NODE_ENV=production"
          ENV_VARS="${ENV_VARS},MONGODB_URI=${{ secrets.MONGODB_URI }}"
          ENV_VARS="${ENV_VARS},JWT_SECRET=${{ secrets.JWT_SECRET }}"
          ENV_VARS="${ENV_VARS},JWT_EXPIRES_IN=7d"
          ENV_VARS="${ENV_VARS},SMTP_HOST=${{ secrets.SMTP_HOST }}"
          ENV_VARS="${ENV_VARS},SMTP_PORT=${{ secrets.SMTP_PORT }}"
          ENV_VARS="${ENV_VARS},SMTP_USER=${{ secrets.SMTP_USER }}"
          ENV_VARS="${ENV_VARS},SMTP_PASS=${{ secrets.SMTP_PASS }}"
          ENV_VARS="${ENV_VARS},EMAIL_FROM=${{ secrets.EMAIL_FROM }}"
          ENV_VARS="${ENV_VARS},EMAIL_FROM_NAME=BilenBilir"
          if [ -n "${{ steps.frontend-url.outputs.url }}" ]; then
            ENV_VARS="${ENV_VARS},CLIENT_URL=${{ steps.frontend-url.outputs.url }}"
          fi

          gcloud run deploy $BACKEND_SERVICE \
            --source ./backend \
            --project $PROJECT_ID \
            --region $REGION \
            --allow-unauthenticated \
            --session-affinity \
            --timeout=3600 \
            --min-instances=0 \
            --max-instances=1 \
            --concurrency=1000 \
            --memory=512Mi \
            --cpu=1 \
            --set-env-vars="$ENV_VARS"

      - name: Build and Deploy Frontend
        run: |
          BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE \
            --project $PROJECT_ID --region $REGION \
            --format='value(status.url)')

          IMAGE="europe-west1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${FRONTEND_SERVICE}:${GITHUB_SHA}"

          cd frontend
          cat > cloudbuild.yaml << EOF
          steps:
            - name: 'gcr.io/cloud-builders/docker'
              args:
                - 'build'
                - '--build-arg'
                - 'VITE_API_URL=${BACKEND_URL}/api'
                - '-t'
                - '${IMAGE}'
                - '.'
          images:
            - '${IMAGE}'
          EOF

          BUILD_ID=$(gcloud builds submit . \
            --config=cloudbuild.yaml \
            --project $PROJECT_ID \
            --async \
            --format='value(id)')

          echo "Waiting for build ${BUILD_ID}..."
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --project $PROJECT_ID --format='value(status)')
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Build succeeded"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

          gcloud run deploy $FRONTEND_SERVICE \
            --image $IMAGE \
            --project $PROJECT_ID \
            --region $REGION \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=2 \
            --memory=128Mi \
            --cpu=1 \
            --port=8080

      - name: Update Backend CORS
        run: |
          FRONTEND_URL=$(gcloud run services describe $FRONTEND_SERVICE \
            --project $PROJECT_ID --region $REGION \
            --format='value(status.url)')

          gcloud run services update $BACKEND_SERVICE \
            --project $PROJECT_ID \
            --region $REGION \
            --update-env-vars="CLIENT_URL=${FRONTEND_URL}"

      - name: Show URLs
        run: |
          BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE \
            --project $PROJECT_ID --region $REGION \
            --format='value(status.url)')
          FRONTEND_URL=$(gcloud run services describe $FRONTEND_SERVICE \
            --project $PROJECT_ID --region $REGION \
            --format='value(status.url)')
          echo "Backend:  $BACKEND_URL"
          echo "Frontend: $FRONTEND_URL"
