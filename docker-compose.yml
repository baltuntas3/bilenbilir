services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bilenbilir-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bilenbilir-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api}
    container_name: bilenbilir-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bilenbilir-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: MongoDB for local development
  mongodb:
    image: mongo:7
    container_name: bilenbilir-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS:-password}
    volumes:
      - mongodb_data:/data/db
    networks:
      - bilenbilir-network

networks:
  bilenbilir-network:
    driver: bridge

volumes:
  mongodb_data:
